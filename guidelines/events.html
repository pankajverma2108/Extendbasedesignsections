<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Vibe House Events - Standalone Handoff</title>
	<meta name="description" content="Standalone handoff version of the Vibe House Events page." />
	<style>
		:root {
			--vh-bg: #160a0f;
			--vh-bg-soft: #2a1220;
			--vh-surface: #211122;
			--vh-surface-2: #0f101a;
			--vh-section-a: #1a0d16;
			--vh-section-b: #230f14;
			--vh-border: #56304d;
			--vh-pink: #ff2e62;
			--vh-pink-soft: #ff6b98;
			--vh-cyan: #00d1ff;
			--vh-lime: #39ff14;
			--vh-amber: #facc15;
			--vh-text: #f8fafc;
			--vh-shadow: 0px 20px 25px -5px rgba(0, 0, 0, 0.18);
			--vh-shadow-card: 8px 8px 0px 0px rgba(255, 46, 98, 0.5);
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			padding: 0;
			font-family: "Nunito", "Segoe UI", sans-serif;
			color: var(--vh-text);
			background:
				radial-gradient(95% 70% at 20% 0%, rgba(255, 76, 48, 0.2) 0%, rgba(255, 76, 48, 0) 60%),
				radial-gradient(85% 65% at 80% 18%, rgba(0, 209, 255, 0.14) 0%, rgba(0, 209, 255, 0) 60%),
				linear-gradient(160deg, var(--vh-bg) 0%, var(--vh-bg-soft) 58%, #130c15 100%);
			min-height: 100%;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		.container {
			width: 100%;
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 16px;
		}

		.section {
			padding: 44px 0;
			background: var(--vh-section-a);
		}

		.section.alt {
			background: var(--vh-section-b);
		}

		.hero {
			position: relative;
			min-height: 70vh;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		.hero img {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.hero::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(to bottom, rgba(15, 23, 42, 0.65), var(--vh-surface-2));
		}

		.hero-content {
			position: relative;
			z-index: 1;
			text-align: center;
			padding: 64px 16px;
		}

		.hero-kicker {
			display: inline-block;
			border-radius: 4px;
			background: linear-gradient(to right, var(--vh-pink), var(--vh-pink-soft));
			padding: 8px 16px;
			font-size: 14px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1.4px;
		}

		.hero h1 {
			margin: 30px 0 0;
			font-size: clamp(52px, 9vw, 120px);
			line-height: 0.95;
			text-transform: uppercase;
			letter-spacing: -0.04em;
			font-family: "Bebas Neue", "Suez One", serif;
			font-weight: 400;
		}

		.hero p {
			max-width: 700px;
			margin: 24px auto 0;
			font-size: 20px;
			font-style: italic;
			color: rgba(255, 255, 255, 0.85);
			line-height: 1.6;
		}

		.heading {
			margin-bottom: 28px;
			text-align: center;
		}

		.heading.left {
			text-align: left;
		}

		.heading h2 {
			margin: 0;
			font-family: "Bebas Neue", "Suez One", serif;
			font-weight: 400;
			text-transform: uppercase;
			letter-spacing: -1px;
			line-height: 1;
			font-size: clamp(36px, 5vw, 56px);
		}

		.heading p {
			margin: 10px 0 0;
			color: rgba(255, 255, 255, 0.75);
			font-style: italic;
		}

		.grid {
			display: grid;
			gap: 24px;
		}

		.events-grid {
			grid-template-columns: 1fr;
		}

		.weekly-grid {
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 20px;
		}

		.memories-grid {
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 16px;
		}

		.event-card {
			overflow: hidden;
			border-radius: 12px;
			border: 1px solid rgba(255, 255, 255, 0.12);
			background: linear-gradient(180deg, rgba(33, 17, 34, 0.98), rgba(17, 10, 17, 0.98));
			box-shadow: var(--vh-shadow);
			transform: rotate(1deg);
		}

		.event-media {
			position: relative;
			height: 220px;
			overflow: hidden;
		}

		.event-media img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.event-media::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(to top, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0));
		}

		.event-title {
			position: absolute;
			left: 16px;
			right: 16px;
			bottom: 16px;
			z-index: 1;
			margin: 0;
			font-family: "Bebas Neue", "Suez One", serif;
			font-weight: 400;
			font-size: 44px;
			line-height: 0.9;
			letter-spacing: -0.03em;
			text-transform: uppercase;
		}

		.event-badge {
			position: absolute;
			top: 16px;
			right: 16px;
			z-index: 1;
			border: 2px solid #fff;
			border-radius: 12px;
			padding: 4px 10px;
			font-size: 10px;
			font-weight: 700;
			text-transform: uppercase;
			box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.25);
			color: #fff;
			letter-spacing: 0.06em;
		}

		.event-content {
			padding: 18px;
			display: grid;
			gap: 16px;
		}

		.event-meta {
			display: grid;
			grid-template-columns: 1fr;
			gap: 8px;
		}

		.event-meta-item {
			display: flex;
			align-items: center;
			gap: 10px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 999px;
			padding: 10px 12px;
			background: rgba(255, 255, 255, 0.04);
			font-size: 14px;
			line-height: 1.4;
			color: rgba(255, 255, 255, 0.82);
			font-weight: 600;
		}

		.event-meta-icon {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 32px;
			height: 32px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.06);
			font-size: 14px;
		}

		.price-box {
			border-radius: 4px;
			border: 2px dashed var(--vh-pink);
			background: rgba(255, 46, 98, 0.1);
			color: var(--vh-pink);
			font-weight: 700;
			text-align: center;
			padding: 10px;
			text-transform: uppercase;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			height: 44px;
			padding: 0 16px;
			border: none;
			border-radius: 8px;
			font-size: 14px;
			font-weight: 700;
			text-transform: uppercase;
			background: var(--vh-pink);
			color: #fff;
			box-shadow: 4px 4px 0 rgba(255, 255, 255, 0.18);
			cursor: pointer;
		}

		.weekly-card {
			border-radius: 12px;
			border: 2px solid var(--vh-border);
			background: var(--vh-surface);
			box-shadow: var(--vh-shadow);
			padding: 24px;
			width: 100%;
		}

		.weekly-day {
			margin: 0;
			font-size: 14px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		.weekly-event {
			margin: 14px 0 0;
			font-family: "Bebas Neue", "Suez One", serif;
			font-weight: 400;
			font-size: 38px;
			line-height: 0.95;
			letter-spacing: -0.03em;
			text-transform: uppercase;
		}

		.weekly-time {
			margin: 10px 0 0;
			font-size: 14px;
			color: rgba(255, 255, 255, 0.65);
		}

		.memory-item {
			overflow: hidden;
			border-radius: 8px;
			border: 4px solid #fff;
			box-shadow: var(--vh-shadow-card);
		}

		.memory-item img {
			width: 100%;
			aspect-ratio: 1 / 1;
			object-fit: cover;
			display: block;
		}

		.instagram-wrap {
			margin-top: 40px;
			text-align: center;
		}

		.instagram-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 12px 26px;
			border-radius: 10px;
			background: var(--vh-pink);
			box-shadow: 4px 4px 0 rgba(255, 255, 255, 0.18);
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			color: #fff;
		}

		@media (min-width: 768px) {
			.container {
				padding: 0 24px;
			}

			.section {
				padding: 56px 0;
			}

			.events-grid {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.event-meta {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.memories-grid {
				grid-template-columns: repeat(3, minmax(0, 1fr));
			}
		}

		@media (min-width: 1024px) {
			.events-grid {
				grid-template-columns: repeat(3, minmax(0, 1fr));
			}

			.weekly-grid {
				grid-template-columns: repeat(6, minmax(0, 1fr));
			}

			.weekly-item {
				grid-column: span 2;
			}
		}
	</style>
</head>
<body>
	<main>
		<section class="hero">
			<img src="https://images.unsplash.com/photo-1758179764880-7513421d202a?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1400" alt="Events hero" />
			<div class="hero-content container">
				<p class="hero-kicker">Every Night is an Adventure</p>
				<h1>Never a<br />Dull Evening.</h1>
				<p>From pub crawls to game nights, meet travelers from around the world and create memories that last.</p>
			</div>
		</section>

		<section class="section">
			<div class="container">
				<div class="heading left">
					<h2>This Week</h2>
					<p>Packed with possibilities</p>
				</div>
				<div id="upcoming-events" class="grid events-grid"></div>
			</div>
		</section>

		<section class="section alt">
			<div class="container">
				<div class="heading">
					<h2>Standard Weekly Lineup</h2>
					<p>Your weekly highlight reel</p>
				</div>
				<div id="weekly-lineup" class="grid weekly-grid"></div>
			</div>
		</section>

		<section class="section">
			<div class="container">
				<div class="heading">
					<h2>The Memories</h2>
					<p>Moments to remember</p>
				</div>
				<div id="past-memories" class="grid memories-grid"></div>
				<div class="instagram-wrap">
					<a class="instagram-btn" href="https://instagram.com/vibehouse" target="_blank" rel="noreferrer">Follow on Instagram</a>
				</div>
			</div>
		</section>
	</main>

	<script>
		const upcomingEvents = [
			{
				title: "Neon DJ Night",
				date: "Mar 18, 2026",
				time: "9:00 PM",
				location: "Rooftop Terrace",
				price: "Free for Guests",
				image: "https://images.unsplash.com/photo-1758179764880-7513421d202a?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1200",
				capacity: "50 guests",
				href: "/events",
				badge: { label: "Tonight", color: "#ff2e62" }
			},
			{
				title: "Old City Pub Crawl",
				date: "Mar 19, 2026",
				time: "8:30 PM",
				location: "Meet at Lobby",
				price: "Rs. 599",
				image: "https://images.unsplash.com/photo-1763651961183-19eb504dee15?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1200",
				capacity: "30 guests",
				href: "/events",
				badge: { label: "Popular", color: "#facc15" }
			},
			{
				title: "Live Local Music",
				date: "Mar 20, 2026",
				time: "7:00 PM",
				location: "Common Area",
				price: "Free for Guests",
				image: "https://images.unsplash.com/photo-1647649644192-af6183269fa4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1200",
				capacity: "40 guests",
				href: "/events",
				badge: { label: "Live", color: "#00d1ff" }
			}
		];

		const weeklyLineup = [
			{ day: "Monday", event: "Movie Night", time: "8:00 PM", color: "#ff2e62" },
			{ day: "Tuesday", event: "Beer Pong Tournament", time: "9:00 PM", color: "#facc15" },
			{ day: "Wednesday", event: "Game Night", time: "7:30 PM", color: "#39ff14" },
			{ day: "Thursday", event: "Pub Crawl", time: "8:30 PM", color: "#00d1ff" },
			{ day: "Friday", event: "DJ Night", time: "9:00 PM", color: "#ff2e62" },
			{ day: "Saturday", event: "Open Mic", time: "8:00 PM", color: "#39ff14" }
		];

		const pastEventImages = [
			"https://images.unsplash.com/photo-1681747971522-2d7a04c78321?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",
			"https://images.unsplash.com/photo-1710144994421-a41e387e71c2?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",
			"https://images.unsplash.com/photo-1766113491996-19167a988455?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",
			"https://images.unsplash.com/photo-1647649644192-af6183269fa4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",
			"https://images.unsplash.com/photo-1622646771382-1c9c090d3c37?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800",
			"https://images.unsplash.com/photo-1641352848574-9dbb6a244a32?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800"
		];

		function renderUpcomingEvents() {
			const root = document.getElementById("upcoming-events");
			root.innerHTML = upcomingEvents.map((event) => {
				return `
					<article class="event-card">
						<div class="event-media">
							<img src="${event.image}" alt="${event.title}" />
							${event.badge ? `<span class="event-badge" style="background:${event.badge.color}">${event.badge.label}</span>` : ""}
							<h3 class="event-title">${event.title}</h3>
						</div>
						<div class="event-content">
							<div class="event-meta">
								<div class="event-meta-item"><span class="event-meta-icon" style="color:var(--vh-pink)">📅</span><span>${event.date}</span></div>
								<div class="event-meta-item"><span class="event-meta-icon" style="color:var(--vh-cyan)">⏰</span><span>${event.time}</span></div>
								<div class="event-meta-item"><span class="event-meta-icon" style="color:var(--vh-lime)">📍</span><span>${event.location}</span></div>
								<div class="event-meta-item"><span class="event-meta-icon" style="color:var(--vh-amber)">👥</span><span>${event.capacity}</span></div>
							</div>
							<div class="price-box">${event.price}</div>
							<a class="btn" href="${event.href}">RSVP / Book</a>
						</div>
					</article>
				`;
			}).join("");
		}

		function renderWeeklyLineup() {
			const root = document.getElementById("weekly-lineup");
			root.innerHTML = weeklyLineup.map((item) => {
				return `
					<article class="weekly-item">
						<div class="weekly-card">
							<p class="weekly-day" style="color:${item.color}">${item.day}</p>
							<h3 class="weekly-event">${item.event}</h3>
							<p class="weekly-time">${item.time}</p>
						</div>
					</article>
				`;
			}).join("");
		}

		function renderPastMemories() {
			const root = document.getElementById("past-memories");
			root.innerHTML = pastEventImages.map((src, index) => {
				const rotate = (index % 3) - 1;
				return `
					<div class="memory-item" style="transform:rotate(${rotate}deg)">
						<img src="${src}" alt="Past event ${index + 1}" />
					</div>
				`;
			}).join("");
		}

		renderUpcomingEvents();
		renderWeeklyLineup();
		renderPastMemories();
	</script>
</body>
</html>
